<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>メモカレンダー</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .calendar-cell { height: 80px; font-size: 0.8rem; overflow-y: auto; }
        .event-tag { background: #dbeafe; color: #1e40af; padding: 1px 3px; border-radius: 3px; margin-top: 1px; display: block; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .tab-content { display: none; }
        .tab-active { display: block; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">
    <header class="bg-white p-3 flex justify-between items-center shadow-sm">
        <h1 class="font-bold text-lg">メモカレンダー</h1>
        <button onclick="document.getElementById('settingsModal').classList.remove('hidden')">⚙️</button>
    </header>

    <main class="flex-1 overflow-hidden p-2">
        <div id="memoTab" class="tab-content tab-active h-full">
            <textarea id="memoInput" class="w-full h-full p-4 border rounded shadow-inner" oninput="parseAndRender()"></textarea>
        </div>
        <div id="calendarTab" class="tab-content h-full flex flex-col">
            <div class="flex justify-between items-center bg-white p-2 mb-2 rounded shadow">
                <button onclick="changeMonth(-1)" class="p-2">◀</button>
                <h2 id="monthDisplay" class="font-bold"></h2>
                <button onclick="changeMonth(1)" class="p-2">▶</button>
            </div>
            <div id="calendarGrid" class="grid grid-cols-7 gap-1 text-center bg-white p-2 rounded shadow flex-1"></div>
        </div>
    </main>

    <nav class="bg-white border-t flex">
        <button onclick="showTab('memoTab')" class="flex-1 p-4 border-r">📝メモ</button>
        <button onclick="showTab('calendarTab')" class="flex-1 p-4 border-r">📅カレンダー</button>
        <button onclick="syncWithGitHub()" class="flex-1 p-4 bg-blue-600 text-white font-bold">保存/同期</button>
    </nav>

    <div id="settingsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded w-full max-w-sm">
            <h2 class="font-bold mb-4">GitHub設定</h2>
            <input id="ghToken" type="password" placeholder="Token" class="w-full border p-2 mb-2">
            <input id="ghUser" type="text" placeholder="ユーザー名" class="w-full border p-2 mb-2">
            <input id="ghRepo" type="text" placeholder="リポジトリ名" class="w-full border p-2 mb-2">
            <input id="ghPath" type="text" value="schedule.txt" class="w-full border p-2 mb-2">
            <button onclick="saveSettings()" class="w-full bg-green-500 text-white p-2 mt-4 rounded">保存して読み込み</button>
        </div>
    </div>

    <script>
        let state = { currentDate: new Date(), events: [] };

        async function syncWithGitHub() {
            const token = localStorage.getItem('ghToken');
            const user = localStorage.getItem('ghUser');
            const repo = localStorage.getItem('ghRepo');
            const path = localStorage.getItem('ghPath') || 'schedule.txt';
            const content = document.getElementById('memoInput').value;

            if(!token || !user || !repo) return alert('設定を入力してください');

            // 1. 現在のファイル情報を取得してSHAを取得（上書きに必要）
            const getRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const fileData = await getRes.json();
            
            // 2. 更新（PUT）
            const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Update schedule",
                    content: btoa(unescape(encodeURIComponent(content))),
                    sha: fileData.sha
                })
            });
            if(res.ok) alert('GitHubに保存しました！');
            else alert('保存失敗: ' + res.statusText);
        }

        async function fetchFromGitHub() {
            const token = localStorage.getItem('ghToken');
            const user = localStorage.getItem('ghUser');
            const repo = localStorage.getItem('ghRepo');
            const path = localStorage.getItem('ghPath') || 'schedule.txt';
            if(!token || !user || !repo) return;

            const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, {
                headers: { 'Authorization': `token ${token}`, 'Cache-Control': 'no-cache' }
            });
            if(res.ok) {
                const data = await res.json();
                const content = decodeURIComponent(escape(atob(data.content)));
                document.getElementById('memoInput').value = content;
                localStorage.setItem('memoBackup', content);
                parseAndRender();
            }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(id).classList.add('tab-active');
            if(id === 'calendarTab') parseAndRender();
        }

        function parseAndRender() {
            const text = document.getElementById('memoInput').value;
            localStorage.setItem('memoBackup', text);
            state.events = [];
            text.split('\n').forEach(line => {
                const match = line.match(/(\d{1,2})[/\.](\d{1,2})|(\d{1,2})月(\d{1,2})日/);
                if(match) {
                    state.events.push({ m: parseInt(match[1]||match[3]), d: parseInt(match[2]||match[4]), label: line });
                }
            });
            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const m = state.currentDate.getMonth();
            const y = state.currentDate.getFullYear();
            document.getElementById('monthDisplay').innerText = `${y}年 ${m+1}月`;
            grid.innerHTML = '日月火水木金土'.split('').map(d => `<div class="font-bold text-xs">${d}</div>`).join('');
            const days = new Date(y, m+1, 0).getDate();
            const first = new Date(y, m, 1).getDay();
            for(let i=0; i<first; i++) grid.innerHTML += '<div></div>';
            for(let d=1; d<=days; d++) {
                const evs = state.events.filter(e => e.m === m+1 && e.d === d);
                grid.innerHTML += `<div class="border p-1 calendar-cell">${d}${evs.map(e => `<span class="event-tag">${e.label}</span>`).join('')}</div>`;
            }
        }

        function saveSettings() {
            localStorage.setItem('ghToken', document.getElementById('ghToken').value);
            localStorage.setItem('ghUser', document.getElementById('ghUser').value);
            localStorage.setItem('ghRepo', document.getElementById('ghRepo').value);
            localStorage.setItem('ghPath', document.getElementById('ghPath').value);
            document.getElementById('settingsModal').classList.add('hidden');
            fetchFromGitHub();
        }

        window.onload = () => {
            document.getElementById('ghToken').value = localStorage.getItem('ghToken') || '';
            document.getElementById('ghUser').value = localStorage.getItem('ghUser') || '';
            document.getElementById('ghRepo').value = localStorage.getItem('ghRepo') || '';
            document.getElementById('ghPath').value = localStorage.getItem('ghPath') || 'schedule.txt';
            document.getElementById('memoInput').value = localStorage.getItem('memoBackup') || '';
            fetchFromGitHub();
        };
        function changeMonth(delta) { state.currentDate.setMonth(state.currentDate.getMonth()+delta); renderCalendar(); }
    </script>
</body>
</html>

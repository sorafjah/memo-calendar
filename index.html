<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="カレンダー">
<title>カレンダー</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --border: #ddd8cf;
  --text: #2c2c2c;
  --text-light: #888;
  --accent: #3a7bd5;
  --accent-light: #e8f0fb;
  --today-bg: #3a7bd5;
  --event-color: #e05c2e;
  --event-bg: #fde8df;
  --highlight: #fff3cd;
  --font: "BIZ UDGothic", "BIZ UDP Gothic", "Yu Gothic UI", "Hiragino Kaku Gothic ProN", sans-serif;
}

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  overflow: hidden;
}

/* ===== レイアウト ===== */
.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
}

.main {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  overflow: hidden;
  min-height: 0;
}

/* ===== カレンダーペイン ===== */
.pane-calendar {
  display: flex;
  flex-direction: column;
  border-right: 2px solid var(--border);
  background: var(--surface);
  overflow: hidden;
  min-height: 0;
}

.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  background: #faf9f7;
  flex-shrink: 0;
}
.cal-nav button {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 12px;
  font-size: 1.1rem;
  cursor: pointer;
  font-family: var(--font);
  -webkit-tap-highlight-color: transparent;
}
.cal-title {
  font-size: 1rem;
  font-weight: 700;
}

.cal-grid {
  flex: 1;
  overflow: hidden;
  padding: 4px;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  flex-shrink: 0;
}
.cal-weekday {
  text-align: center;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 3px 0;
  color: var(--text-light);
}
.cal-weekday:first-child { color: #c0392b; }
.cal-weekday:last-child { color: #2980b9; }

/* スワイプ用ラッパー */
.cal-swipe-wrapper {
  flex: 1;
  overflow: hidden;
  position: relative;
  min-height: 0;
}
.cal-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-template-rows: repeat(6, 1fr);
  height: 100%;
  gap: 2px;
}

/* ===== カレンダーセル ===== */
.cal-cell {
  border-radius: 5px;
  padding: 2px 3px;
  cursor: pointer;
  border: 1px solid transparent;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.cal-cell:active { background: var(--accent-light); }
.cal-cell.other-month { opacity: 0.3; }
.cal-cell.today .day-num {
  background: var(--today-bg);
  color: #fff;
  border-radius: 50%;
}
.cal-cell.selected { border-color: var(--accent); background: var(--accent-light); }
.cal-cell.sunday .day-num { color: #c0392b; }
.cal-cell.saturday .day-num { color: #2980b9; }

.day-num {
  font-size: 0.75rem;
  font-weight: 600;
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.day-events {
  display: flex;
  flex-direction: column;
  gap: 1px;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}
.event-chip {
  font-size: 0.6rem;
  background: var(--event-bg);
  color: var(--event-color);
  border-radius: 2px;
  padding: 0 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.5;
  flex-shrink: 0;
}

/* ===== テキストペイン ===== */
.pane-text {
  display: flex;
  flex-direction: column;
  background: var(--surface);
  overflow: hidden;
  min-height: 0;
}

#schedule-text {
  flex: 1;
  border: none;
  outline: none;
  resize: none;
  padding: 12px;
  font-family: var(--font);
  font-size: 0.95rem;
  line-height: 2;
  background: transparent;
  color: var(--text);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* ===== フッター（設定エリア） ===== */
footer {
  border-top: 2px solid var(--border);
  background: #faf9f7;
  padding: 6px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  padding-bottom: max(6px, env(safe-area-inset-bottom));
}
.sync-status {
  font-size: 0.75rem;
  color: var(--text-light);
}
.btn-settings {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 0.8rem;
  font-family: var(--font);
  color: var(--text-light);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* ===== モーダル ===== */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 300;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.modal.hidden { display: none; }
.modal-box {
  background: var(--surface);
  border-radius: 16px 16px 0 0;
  padding: 20px 20px max(20px, env(safe-area-inset-bottom));
  width: 100%;
  max-width: 500px;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
  max-height: 90vh;
  overflow-y: auto;
}
.modal-box h2 {
  font-size: 1rem;
  margin-bottom: 14px;
  font-weight: 700;
}
.form-group { margin-bottom: 10px; }
.form-group label {
  display: block;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text-light);
  margin-bottom: 3px;
}
.form-group input {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: var(--font);
  font-size: 0.9rem;
  background: var(--bg);
}
.form-group input:focus {
  outline: 2px solid var(--accent);
  border-color: transparent;
}
.form-note { font-size: 0.72rem; color: var(--text-light); margin-top: 2px; }
.modal-buttons {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}
.btn {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-family: var(--font);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--border); color: var(--text); }

/* ===== 日付入力ポップアップ ===== */
.popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
}
.popup.hidden { display: none; }
.popup-box {
  background: var(--surface);
  border-radius: 12px;
  padding: 18px 20px;
  width: min(320px, 92vw);
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
}
.popup-box h2 { font-size: 0.95rem; margin-bottom: 10px; font-weight: 700; }
.popup-event-list { font-size: 0.9rem; line-height: 2; margin-bottom: 10px; }
.popup-event-list li {
  list-style: none;
  padding-left: 14px;
  position: relative;
  cursor: pointer;
}
.popup-event-list li::before {
  content: "●";
  color: var(--event-color);
  font-size: 0.5rem;
  position: absolute;
  left: 0;
  top: 7px;
}
.popup-add {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.popup-add input {
  flex: 1;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: var(--font);
  font-size: 0.9rem;
}
.popup-add input:focus { outline: 2px solid var(--accent); border-color: transparent; }
.popup-add button {
  padding: 7px 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-family: var(--font);
  font-size: 0.9rem;
  cursor: pointer;
  font-weight: 600;
}
.popup-bottom {
  display: flex;
  justify-content: flex-end;
  margin-top: 12px;
}
.popup-close {
  padding: 6px 18px;
  background: var(--border);
  color: var(--text);
  border: none;
  border-radius: 7px;
  font-size: 0.9rem;
  cursor: pointer;
  font-family: var(--font);
  font-weight: 600;
}

/* ===== スマホ ===== */
@media (max-width: 700px) {
  .main {
    grid-template-columns: 1fr;
    grid-template-rows: 1fr auto;
  }
  .pane-calendar {
    border-right: none;
    border-bottom: 2px solid var(--border);
  }
  .pane-text {
    height: 38vh;
    min-height: 140px;
    max-height: 45vh;
  }
  #schedule-text { font-size: 0.9rem; }
}

@media (min-width: 701px) {
  /* PC: テキストが左、カレンダーが右 → flexの順序でpane-textを先にしてある */
  .main { grid-template-columns: 1fr 1fr; }
  .pane-calendar { order: 2; border-right: none; border-left: 2px solid var(--border); }
  .pane-text { order: 1; }
}
</style>
</head>
<body>
<div class="app">

  <div class="main">
    <!-- カレンダー（モバイルで上に来る） -->
    <div class="pane-calendar">
      <div class="cal-nav">
        <button id="btn-prev">&#8249;</button>
        <span class="cal-title" id="cal-title"></span>
        <button id="btn-next">&#8250;</button>
      </div>
      <div class="cal-grid">
        <div class="cal-weekdays">
          <div class="cal-weekday">日</div>
          <div class="cal-weekday">月</div>
          <div class="cal-weekday">火</div>
          <div class="cal-weekday">水</div>
          <div class="cal-weekday">木</div>
          <div class="cal-weekday">金</div>
          <div class="cal-weekday">土</div>
        </div>
        <div class="cal-swipe-wrapper" id="cal-swipe-wrapper">
          <div class="cal-days" id="cal-days"></div>
        </div>
      </div>
    </div>

    <!-- テキストエリア -->
    <div class="pane-text">
      <textarea id="schedule-text" placeholder="6/5 生徒会選挙ポスター&#10;6/23火 創立記念日&#10;10/7〜10/9 修学旅行"></textarea>
    </div>
  </div>

  <!-- フッター（設定） -->
  <footer>
    <span class="sync-status" id="sync-status"></span>
    <button class="btn-settings" id="btn-settings">GitHub設定</button>
  </footer>
</div>

<!-- 日付ポップアップ -->
<div class="popup hidden" id="popup">
  <div class="popup-box">
    <h2 id="popup-date"></h2>
    <ul class="popup-event-list" id="popup-events"></ul>
    <div class="popup-add">
      <input type="text" id="popup-input" placeholder="予定を追加…">
      <button id="popup-add-btn">追加</button>
    </div>
    <div class="popup-bottom">
      <button class="popup-close" id="popup-close">閉じる</button>
    </div>
  </div>
</div>

<!-- GitHub設定モーダル -->
<div class="modal hidden" id="modal-github">
  <div class="modal-box">
    <h2>GitHub設定</h2>
    <div class="form-group">
      <label>GitHubユーザー名</label>
      <input type="text" id="gh-user" placeholder="例: sorafjah" autocomplete="off">
    </div>
    <div class="form-group">
      <label>リポジトリ名</label>
      <input type="text" id="gh-repo" placeholder="例: my-schedule" autocomplete="off">
    </div>
    <div class="form-group">
      <label>ファイルパス</label>
      <input type="text" id="gh-path" placeholder="例: schedule.txt" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Personal Access Token</label>
      <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
      <div class="form-note">ブラウザのlocalStorageのみに保存。外部送信なし。</div>
    </div>
    <div class="modal-buttons">
      <button class="btn btn-secondary" id="modal-cancel">キャンセル</button>
      <button class="btn btn-primary" id="modal-save">保存</button>
    </div>
  </div>
</div>

<script>
// =====================
// サンプルデータ
// =====================
const SAMPLE = `6/5生徒会選挙ポスター
6/7そめはちさんNHK
6月6日　福岡
6/23火　創立記念日
7/15水     あかつき18:30
9/14月　弁当
10/7〜10/9 修学旅行
11/27金　生徒会選挙`;

// =====================
// 状態
// =====================
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let events = {};
let selectedDate = null;
let autoSaveTimer = null;
let popupDateKey = null;
let popupYear, popupMonth, popupDay;

// =====================
// ユーティリティ
// =====================
function toKey(y, m, d) {
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function parseYear(m, d) {
  const now = new Date();
  const y = now.getFullYear();
  const d1 = new Date(y, m-1, d);
  const threshold = new Date(now);
  threshold.setMonth(threshold.getMonth() - 3);
  return d1 < threshold ? y + 1 : y;
}

// =====================
// テキスト解析
// =====================
function parseSchedule(text) {
  const result = {};
  const lines = text.split('\n');
  const patterns = [
    {
      re: /^(\d{1,2})[\/月](\d{1,2})[日]?\s*[〜～\-]\s*(\d{1,2})[\/月](\d{1,2})[日]?\s*(.*)/,
      type: 'range',
      extract: m => ({ m1:+m[1], d1:+m[2], m2:+m[3], d2:+m[4], title: m[5].trim() || '（予定）' })
    },
    {
      re: /^(\d{1,2})月(\d{1,2})日[（(]?[月火水木金土日]?[）)]?\s*(.*)/,
      type: 'single',
      extract: m => ({ mo:+m[1], da:+m[2], title: m[3].trim() || '（予定）' })
    },
    {
      re: /^(\d{1,2})\/(\d{1,2})[月火水木金土日]?\s*(.*)/,
      type: 'single',
      extract: m => ({ mo:+m[1], da:+m[2], title: m[3].trim() || '（予定）' })
    },
  ];
  lines.forEach((rawLine, lineIndex) => {
    const line = rawLine.trim();
    if (!line) return;
    for (const pat of patterns) {
      const m = line.match(pat.re);
      if (!m) continue;
      if (pat.type === 'single') {
        const { mo, da, title } = pat.extract(m);
        if (mo < 1 || mo > 12 || da < 1 || da > 31) break;
        const yr = parseYear(mo, da);
        const key = toKey(yr, mo, da);
        if (!result[key]) result[key] = [];
        result[key].push({ title, lineIndex });
      } else {
        const { m1, d1, m2, d2, title } = pat.extract(m);
        if (m1<1||m1>12||d1<1||d1>31||m2<1||m2>12||d2<1||d2>31) break;
        const yr1 = parseYear(m1, d1);
        let cur = new Date(yr1, m1-1, d1);
        const yr2 = m2 < m1 ? yr1+1 : yr1;
        const end = new Date(yr2, m2-1, d2);
        let n = 0;
        while (cur <= end && n++ < 400) {
          const key = toKey(cur.getFullYear(), cur.getMonth()+1, cur.getDate());
          if (!result[key]) result[key] = [];
          result[key].push({ title, lineIndex });
          cur.setDate(cur.getDate()+1);
        }
      }
      break;
    }
  });
  return result;
}

// =====================
// カレンダー描画
// =====================
function renderCalendar() {
  document.getElementById('cal-title').textContent =
    `${currentYear}年 ${currentMonth+1}月`;
  const container = document.getElementById('cal-days');
  container.innerHTML = '';
  const today = new Date();
  const firstDay = new Date(currentYear, currentMonth, 1);
  const lastDay = new Date(currentYear, currentMonth+1, 0);
  const startDow = firstDay.getDay();
  const prevLastDay = new Date(currentYear, currentMonth, 0);
  for (let i = startDow-1; i >= 0; i--) {
    const d = prevLastDay.getDate()-i;
    const mo = currentMonth === 0 ? 12 : currentMonth;
    const yr = currentMonth === 0 ? currentYear-1 : currentYear;
    container.appendChild(makeCell(yr, mo, d, true));
  }
  for (let d = 1; d <= lastDay.getDate(); d++) {
    container.appendChild(makeCell(currentYear, currentMonth+1, d, false));
  }
  const endDow = lastDay.getDay();
  const nextMo = currentMonth === 11 ? 1 : currentMonth+2;
  const nextYr = currentMonth === 11 ? currentYear+1 : currentYear;
  for (let d = 1; d <= 6-endDow; d++) {
    container.appendChild(makeCell(nextYr, nextMo, d, true));
  }
}

function makeCell(year, month, day, otherMonth) {
  const cell = document.createElement('div');
  cell.className = 'cal-cell';
  if (otherMonth) cell.classList.add('other-month');
  const dow = new Date(year, month-1, day).getDay();
  if (dow === 0) cell.classList.add('sunday');
  if (dow === 6) cell.classList.add('saturday');
  const today = new Date();
  if (year===today.getFullYear() && month===today.getMonth()+1 && day===today.getDate())
    cell.classList.add('today');
  const key = toKey(year, month, day);
  if (selectedDate === key) cell.classList.add('selected');
  const num = document.createElement('div');
  num.className = 'day-num';
  num.textContent = day;
  cell.appendChild(num);
  if (events[key] && events[key].length > 0) {
    const evDiv = document.createElement('div');
    evDiv.className = 'day-events';
    // 最大2件まで、先頭5文字でクリップ
    events[key].slice(0, 2).forEach(ev => {
      const chip = document.createElement('div');
      chip.className = 'event-chip';
      chip.textContent = ev.title.length > 5 ? ev.title.slice(0,5)+'…' : ev.title;
      evDiv.appendChild(chip);
    });
    if (events[key].length > 2) {
      const more = document.createElement('div');
      more.className = 'event-chip';
      more.textContent = `+${events[key].length-2}`;
      evDiv.appendChild(more);
    }
    cell.appendChild(evDiv);
  }
  cell.addEventListener('click', () => openPopup(key, year, month, day));
  return cell;
}

// =====================
// 日付ポップアップ
// =====================
function openPopup(key, year, month, day) {
  selectedDate = key;
  popupDateKey = key;
  popupYear = year; popupMonth = month; popupDay = day;
  document.getElementById('popup-date').textContent =
    `${year}年${month}月${day}日`;
  renderPopupEvents();
  document.getElementById('popup-input').value = '';
  document.getElementById('popup').classList.remove('hidden');
  renderCalendar();
}

function renderPopupEvents() {
  const list = document.getElementById('popup-events');
  list.innerHTML = '';
  (events[popupDateKey] || []).forEach(ev => {
    const li = document.createElement('li');
    li.textContent = ev.title;
    li.addEventListener('click', () => {
      closePopup();
      highlightLine(ev.lineIndex);
    });
    list.appendChild(li);
  });
}

function closePopup() {
  document.getElementById('popup').classList.add('hidden');
  popupDateKey = null;
}

// カレンダーから予定を追加
function addEventFromPopup() {
  const input = document.getElementById('popup-input');
  const title = input.value.trim();
  if (!title || !popupDateKey) return;
  // テキストエリアに追記
  const mo = popupMonth;
  const da = popupDay;
  const newLine = `${mo}/${da} ${title}`;
  const ta = document.getElementById('schedule-text');
  const cur = ta.value;
  ta.value = cur ? cur + '\n' + newLine : newLine;
  // 再解析
  events = parseSchedule(ta.value);
  renderCalendar();
  renderPopupEvents();
  input.value = '';
  scheduleAutoSave();
}

function highlightLine(lineIndex) {
  const ta = document.getElementById('schedule-text');
  const lines = ta.value.split('\n');
  let pos = 0;
  for (let i = 0; i < lineIndex; i++) pos += lines[i].length + 1;
  const end = pos + (lines[lineIndex] || '').length;
  ta.focus();
  ta.setSelectionRange(pos, end);
  ta.scrollTop = lineIndex * (0.9 * 16 * 2) - 40;
}

// =====================
// 自動保存
// =====================
function scheduleAutoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(syncSave, 2000); // 2秒後に保存
}

function onTextChange() {
  events = parseSchedule(document.getElementById('schedule-text').value);
  renderCalendar();
  scheduleAutoSave();
}

// =====================
// スワイプ
// =====================
let touchStartX = 0;
let touchStartY = 0;

document.getElementById('cal-swipe-wrapper').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.getElementById('cal-swipe-wrapper').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if (dx < 0) goNextMonth();
    else goPrevMonth();
  }
}, { passive: true });

function goPrevMonth() {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}
function goNextMonth() {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar();
}

// =====================
// GitHub 設定
// =====================
const GH_KEYS = ['gh-user','gh-repo','gh-path','gh-token'];
function loadGhSettings() {
  GH_KEYS.forEach(k => {
    const v = localStorage.getItem(k);
    if (v) document.getElementById(k).value = v;
  });
}
function saveGhSettings() {
  GH_KEYS.forEach(k => localStorage.setItem(k, document.getElementById(k).value));
  document.getElementById('modal-github').classList.add('hidden');
  syncLoad(); // 設定後すぐ読み込み
}
function getGhConfig() {
  return {
    user: localStorage.getItem('gh-user') || '',
    repo: localStorage.getItem('gh-repo') || '',
    path: localStorage.getItem('gh-path') || 'schedule.txt',
    token: localStorage.getItem('gh-token') || '',
  };
}
function isGhConfigured() {
  const c = getGhConfig();
  return c.user && c.repo && c.token;
}

// =====================
// GitHub API
// =====================
async function ghFetch(text) {
  const c = getGhConfig();
  const url = `https://api.github.com/repos/${c.user}/${c.repo}/contents/${c.path}`;
  const headers = {
    'Authorization': `token ${c.token}`,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json',
  };
  let sha = '';
  try {
    const res = await fetch(url, { headers });
    if (res.ok) {
      const data = await res.json();
      sha = data.sha;
      if (text === null) {
        return decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
      }
    }
  } catch(e) {}
  if (text === null) return null;
  const body = { message: 'Update schedule', content: btoa(unescape(encodeURIComponent(text))) };
  if (sha) body.sha = sha;
  const res = await fetch(url, { method:'PUT', headers, body: JSON.stringify(body) });
  return res.ok;
}

function setStatus(msg, ok = true) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.style.color = ok ? '#27ae60' : '#e74c3c';
  if (msg) setTimeout(() => { el.textContent = ''; }, 3000);
}

async function syncLoad() {
  if (!isGhConfigured()) return;
  setStatus('読込中…');
  try {
    const text = await ghFetch(null);
    if (text !== null) {
      document.getElementById('schedule-text').value = text;
      events = parseSchedule(text);
      renderCalendar();
      setStatus('読込完了');
    } else {
      setStatus('');
    }
  } catch(e) { setStatus('読込失敗', false); }
}

async function syncSave() {
  if (!isGhConfigured()) return;
  setStatus('保存中…');
  try {
    const text = document.getElementById('schedule-text').value;
    const ok = await ghFetch(text);
    setStatus(ok ? '保存完了' : '保存失敗', !!ok);
  } catch(e) { setStatus('保存失敗', false); }
}

// =====================
// 初期化
// =====================
function init() {
  document.getElementById('schedule-text').value = SAMPLE;
  events = parseSchedule(SAMPLE);
  renderCalendar();

  document.getElementById('schedule-text').addEventListener('input', onTextChange);

  document.getElementById('btn-prev').addEventListener('click', goPrevMonth);
  document.getElementById('btn-next').addEventListener('click', goNextMonth);

  document.getElementById('btn-settings').addEventListener('click', () => {
    loadGhSettings();
    document.getElementById('modal-github').classList.remove('hidden');
  });
  document.getElementById('modal-cancel').addEventListener('click', () => {
    document.getElementById('modal-github').classList.add('hidden');
  });
  document.getElementById('modal-save').addEventListener('click', saveGhSettings);

  document.getElementById('popup-close').addEventListener('click', closePopup);
  document.getElementById('popup').addEventListener('click', e => {
    if (e.target === document.getElementById('popup')) closePopup();
  });
  document.getElementById('popup-add-btn').addEventListener('click', addEventFromPopup);
  document.getElementById('popup-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addEventFromPopup();
  });

  syncLoad();
}

document.addEventListener('DOMContentLoaded', init);
</script>

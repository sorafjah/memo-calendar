<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="カレンダー">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="calendar.png">
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;カレンダー&quot;,&quot;short_name&quot;:&quot;カレンダー&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%23ffffff&quot;,&quot;theme_color&quot;:&quot;%23ffffff&quot;,&quot;icons&quot;:[{&quot;src&quot;:&quot;calendar.png&quot;,&quot;sizes&quot;:&quot;any&quot;,&quot;type&quot;:&quot;image/png&quot;}]}">
<title>カレンダー</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --border: #ddd8cf;
  --text: #2c2c2c;
  --text-light: #888;
  --accent: #3a7bd5;
  --accent-light: #e8f0fb;
  --today-bg: #3a7bd5;
  --event-color: #1a1a1a;
  --event-bg: #ffffff;
  --event-border: #5bb8f5;
  --font: "BIZ UDGothic", "BIZ UDP Gothic", "Yu Gothic UI", "Hiragino Kaku Gothic ProN", sans-serif;
  --font-pc: Arial, "Hiragino Kaku Gothic ProN", sans-serif;
  --cell-pad: 3px;
  --daynum-w: 26px;
}

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 18px;
  overflow: hidden;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: row;
  overflow: hidden;
  min-height: 0;
}

/* ===== カレンダーペイン ===== */
.pane-calendar {
  flex: 2;
  display: flex;
  flex-direction: column;
  border-right: 2px solid var(--border);
  background: var(--surface);
  overflow: hidden;
  min-width: 0;
}

.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: #faf9f7;
  flex-shrink: 0;
}
.cal-nav button {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 14px;
  font-size: 1.1rem;
  cursor: pointer;
  font-family: var(--font);
  -webkit-tap-highlight-color: transparent;
}
.cal-title { font-size: 1.15rem; font-weight: 700; }

.cal-inner {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
  padding: 4px;
}

.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  flex-shrink: 0;
}
.cal-weekday {
  font-size: 0.88rem;
  font-weight: 700;
  padding: 4px var(--cell-pad);
  display: flex;
  align-items: center;
  justify-content: flex-start;
  width: calc(var(--daynum-w));
  color: var(--text-light);
  overflow: hidden;
}
.cal-weekday:first-child { color: #c0392b; }
.cal-weekday:last-child  { color: #2980b9; }

.cal-swipe-wrapper {
  flex: 1;
  min-height: 0;
  touch-action: pan-y;
  overflow: hidden;
}

.cal-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  height: 100%;
  gap: 2px;
}

/* ===== カレンダーセル ===== */
.cal-cell {
  border-radius: 5px;
  padding: var(--cell-pad);
  cursor: pointer;
  border: 1px solid transparent;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-width: 0;
  -webkit-tap-highlight-color: transparent;
}
.cal-cell:active { background: var(--accent-light); }
.cal-cell.other-month { opacity: 0.28; }

.cal-cell.today .day-num {
  background: var(--today-bg);
  color: #fff;
  border-radius: 50%;
}

.cal-cell.sunday  .day-num { color: #c0392b; }
.cal-cell.saturday .day-num { color: #2980b9; }
.cal-cell.today .day-num { color: #fff !important; }

.day-num {
  font-size: 1rem;
  font-weight: 600;
  width: var(--daynum-w);
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.day-events {
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow: hidden;
  min-height: 0;
  flex: 1;
}

.event-chip {
  font-size: 0.78rem;
  font-weight: 600;
  background: var(--event-bg);
  color: var(--event-color);
  border-radius: 3px;
  border: 1.5px solid var(--event-border);
  padding: 2px 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.5;
  flex-shrink: 0;
}

/* ===== 祝日 ===== */
.cal-cell.holiday .day-num { color: #c0392b; }
.cal-cell.today.holiday .day-num { color: #fff !important; }
.holiday-chip {
  font-size: 0.6rem;
  color: #c0392b;
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-top: 1px;
  flex-shrink: 0;
}
@media (min-width: 701px) {
  .holiday-chip { font-size: 0.72rem; }
}

/* ===== テキストペイン ===== */
.pane-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  overflow: hidden;
  min-width: 0;
}
#schedule-text {
  flex: 1;
  border: none;
  outline: none;
  resize: none;
  padding: 14px;
  font-family: var(--font);
  font-size: 1rem;
  line-height: 2.1;
  background: transparent;
  color: var(--text);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* ===== フッター ===== */
footer {
  border-top: 2px solid var(--border);
  background: #faf9f7;
  padding: 6px 14px;
  padding-bottom: max(6px, env(safe-area-inset-bottom));
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.sync-status { font-size: 0.75rem; color: var(--text-light); }
.footer-right { display: flex; gap: 8px; align-items: center; }
.btn-settings, .btn-reload {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 12px;
  font-size: 0.8rem;
  font-family: var(--font);
  color: var(--text-light);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
@media (min-width: 701px) {
  .btn-reload { display: none; }
}

/* ===== ポップアップ ===== */
.popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
}
.popup.hidden { display: none; }
.popup-box {
  background: var(--surface);
  border-radius: 12px;
  padding: 18px 20px;
  width: min(320px, 92vw);
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
}
.popup-box h2 { font-size: 0.95rem; margin-bottom: 10px; font-weight: 700; }
.popup-event-list { font-size: 0.9rem; line-height: 2.1; margin-bottom: 8px; }
.popup-event-list li {
  list-style: none;
  padding-left: 14px;
  position: relative;
  cursor: pointer;
}
.popup-event-list li::before {
  content: "●";
  color: #c0392b;
  font-size: 0.5rem;
  position: absolute;
  left: 0; top: 8px;
}
.popup-add { display: flex; gap: 6px; margin-top: 8px; }
.popup-add input {
  flex: 1;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: var(--font);
  font-size: 0.9rem;
}
.popup-add input:focus { outline: 2px solid var(--accent); border-color: transparent; }
.popup-add button {
  padding: 7px 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-family: var(--font);
  font-size: 0.9rem;
  cursor: pointer;
  font-weight: 600;
}
.popup-bottom { display: flex; justify-content: flex-end; margin-top: 12px; }
.popup-close {
  padding: 6px 18px;
  background: var(--border);
  color: var(--text);
  border: none;
  border-radius: 7px;
  font-size: 0.9rem;
  cursor: pointer;
  font-family: var(--font);
  font-weight: 600;
}

/* ===== GitHub設定モーダル ===== */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 300;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.modal.hidden { display: none; }
.modal-box {
  background: var(--surface);
  border-radius: 16px 16px 0 0;
  padding: 20px 20px;
  padding-bottom: max(20px, env(safe-area-inset-bottom));
  width: 100%;
  max-width: 520px;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
  max-height: 90vh;
  overflow-y: auto;
}
.modal-box h2 { font-size: 1rem; margin-bottom: 14px; font-weight: 700; }
.form-group { margin-bottom: 10px; }
.form-group label {
  display: block;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text-light);
  margin-bottom: 3px;
}
.form-group input {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: var(--font);
  font-size: 0.9rem;
  background: var(--bg);
}
.form-group input:focus { outline: 2px solid var(--accent); border-color: transparent; }
.form-note { font-size: 0.72rem; color: var(--text-light); margin-top: 2px; }
.modal-buttons { display: flex; gap: 8px; margin-top: 16px; }
.btn {
  flex: 1; padding: 10px; border: none;
  border-radius: 8px; font-family: var(--font);
  font-size: 0.9rem; font-weight: 600; cursor: pointer;
}
.btn-primary  { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--border); color: var(--text); }

/* ===== PC専用スタイル ===== */
@media (min-width: 701px) {
  html, body { font-family: var(--font-pc); font-size: 18px; }
  .cal-title { font-size: 1.4rem; }
  .cal-weekday { font-size: 1rem; padding: 6px var(--cell-pad); font-weight: 700; }
  :root { --daynum-w: 32px; }
  .day-num { font-size: 1.15rem; width: 32px; height: 32px; }
  .event-chip { font-size: 0.88rem; padding: 2px 6px; }
  #schedule-text { font-size: 1.1rem; line-height: 2.2; }
  .cal-nav button { font-size: 1.3rem; padding: 5px 18px; }
}

/* ===== スマホ ===== */
@media (max-width: 700px) {
  .main { flex-direction: column; }

  .pane-calendar {
    flex: none;
    height: 52vh;
    min-height: 280px;
    border-right: none;
    border-bottom: 2px solid var(--border);
  }
  .cal-inner { padding: 2px; }

  .pane-text { flex: 1; min-height: 100px; }
  #schedule-text { font-size: 1.05rem; line-height: 2.2; }

  :root { --daynum-w: 20px; }
  .day-num { font-size: 0.8rem; width: 20px; height: 20px; }
  .cal-weekday { font-size: 0.72rem; padding: 3px var(--cell-pad); width: var(--daynum-w); }

  .event-chip {
    font-size: 0.6rem;
    font-weight: 700;
    background: transparent;
    color: #c0392b;
    border: 1px solid #e8a090;
    padding: 0 2px;
    line-height: 1.4;
  }
}
</style>
</head>
<body>
<div class="app">
  <div class="main">

    <div class="pane-calendar">
      <div class="cal-nav">
        <button id="btn-prev">&#8249;</button>
        <span class="cal-title" id="cal-title"></span>
        <button id="btn-next">&#8250;</button>
      </div>
      <div class="cal-inner">
        <div class="cal-weekdays">
          <div class="cal-weekday">日</div>
          <div class="cal-weekday">月</div>
          <div class="cal-weekday">火</div>
          <div class="cal-weekday">水</div>
          <div class="cal-weekday">木</div>
          <div class="cal-weekday">金</div>
          <div class="cal-weekday">土</div>
        </div>
        <div class="cal-swipe-wrapper" id="cal-swipe-wrapper">
          <div class="cal-days" id="cal-days"></div>
        </div>
      </div>
    </div>

    <div class="pane-text">
      <textarea id="schedule-text"
        placeholder="6/5 生徒会選挙ポスター&#10;6/23火 創立記念日&#10;10/7〜10/9 修学旅行"></textarea>
    </div>

  </div>

  <footer>
    <span class="sync-status" id="sync-status"></span>
    <div class="footer-right">
      <button class="btn-reload" id="btn-reload">再読込</button>
      <button class="btn-settings" id="btn-settings">GitHub設定</button>
    </div>
  </footer>
</div>

<!-- 日付ポップアップ -->
<div class="popup hidden" id="popup">
  <div class="popup-box">
    <h2 id="popup-date"></h2>
    <ul class="popup-event-list" id="popup-events"></ul>
    <div class="popup-add">
      <input type="text" id="popup-input" placeholder="予定を追加…">
      <button id="popup-add-btn">追加</button>
    </div>
    <div class="popup-bottom">
      <button class="popup-close" id="popup-close">閉じる</button>
    </div>
  </div>
</div>

<!-- GitHub設定モーダル -->
<!-- ★ input の id に calendar- プレフィックスを付けて他アプリと分離 -->
<div class="modal hidden" id="modal-github">
  <div class="modal-box">
    <h2>GitHub設定</h2>
    <div class="form-group">
      <label>GitHubユーザー名</label>
      <input type="text" id="calendar-gh-user" autocomplete="off">
    </div>
    <div class="form-group">
      <label>リポジトリ名</label>
      <input type="text" id="calendar-gh-repo" autocomplete="off">
    </div>
    <div class="form-group">
      <label>ファイルパス</label>
      <input type="text" id="calendar-gh-path" placeholder="schedule.txt" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Personal Access Token</label>
      <input type="password" id="calendar-gh-token" autocomplete="off">
      <div class="form-note">localStorageのみに保存。外部送信なし。</div>
    </div>
    <div class="modal-buttons">
      <button class="btn btn-secondary" id="modal-cancel">キャンセル</button>
      <button class="btn btn-primary"   id="modal-save">保存</button>
    </div>
  </div>
</div>

<script>
const SAMPLE = `6/5生徒会選挙ポスター
6/7そめはちさんNHK
6月6日　福岡
6/23火　創立記念日
7/15水     あかつき18:30
9/14月　弁当
10/7〜10/9 修学旅行
11/27金　生徒会選挙`;

let currentYear  = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let events = {};
let selectedDate = null;
let autoSaveTimer = null;
let popupDateKey = null, popupYear, popupMonth, popupDay;
const isMobile = () => window.innerWidth <= 700;

function toKey(y, m, d) {
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function guessYear(mo, da) {
  const now = new Date(), y = now.getFullYear();
  const d1 = new Date(y, mo-1, da);
  const thr = new Date(now); thr.setMonth(thr.getMonth()-3);
  return d1 < thr ? y+1 : y;
}

// ===== 解析 =====
function parseSchedule(text) {
  const result = {};
  const pats = [
    { re: /^(\d{1,2})[\/月](\d{1,2})[日]?\s*[〜～\-]\s*(\d{1,2})[\/月](\d{1,2})[日]?\s*(.*)/,
      fn(m,li){ let [,m1,d1,m2,d2,t]=[...m]; [m1,d1,m2,d2]=[+m1,+d1,+m2,+d2]; t=t.trim()||'（予定）';
        if(m1<1||m1>12||d1<1||d1>31||m2<1||m2>12||d2<1||d2>31)return;
        const y1=guessYear(m1,d1), y2=m2<m1?y1+1:y1;
        let c=new Date(y1,m1-1,d1); const e=new Date(y2,m2-1,d2);
        for(let n=0;c<=e&&n<400;n++,c.setDate(c.getDate()+1)){
          const k=toKey(c.getFullYear(),c.getMonth()+1,c.getDate());
          (result[k]=result[k]||[]).push({title:t,lineIndex:li});
        }
      }
    },
    { re: /^(\d{1,2})月(\d{1,2})日[（(]?[月火水木金土日]?[）)]?\s*(.*)/,
      fn(m,li){ const mo=+m[1],da=+m[2],t=m[3].trim()||'（予定）';
        if(mo<1||mo>12||da<1||da>31)return;
        const k=toKey(guessYear(mo,da),mo,da);
        (result[k]=result[k]||[]).push({title:t,lineIndex:li});
      }
    },
    { re: /^(\d{1,2})\/(\d{1,2})[月火水木金土日]?\s*(.*)/,
      fn(m,li){ const mo=+m[1],da=+m[2],t=m[3].trim()||'（予定）';
        if(mo<1||mo>12||da<1||da>31)return;
        const k=toKey(guessYear(mo,da),mo,da);
        (result[k]=result[k]||[]).push({title:t,lineIndex:li});
      }
    },
  ];
  text.split('\n').forEach((raw,li)=>{
    const line=raw.trim(); if(!line)return;
    for(const p of pats){ const m=line.match(p.re); if(m){p.fn(m,li);break;} }
  });
  return result;
}

// ===== 日本の祝日 =====
const FIXED_HOLIDAYS = {
  '1-1':  '元日', '2-11': '建国記念の日', '2-23': '天皇誕生日',
  '3-20': '春分の日', '4-29': '昭和の日', '5-3':  '憲法記念日',
  '5-4':  'みどりの日', '5-5':  'こどもの日', '8-11': '山の日',
  '9-23': '秋分の日', '11-3': '文化の日', '11-23':'勤労感謝の日',
};
const HAPPY_MONDAY = [
  { month:1, nth:2, name:'成人の日' }, { month:7, nth:3, name:'海の日' },
  { month:9, nth:3, name:'敬老の日' }, { month:10,nth:2, name:'スポーツの日' },
];
function getEquinox(year) {
  const spring = Math.floor(20.8431 + 0.242194*(year-1980) - Math.floor((year-1980)/4));
  const autumn = Math.floor(23.2488 + 0.242194*(year-1980) - Math.floor((year-1980)/4));
  return { spring, autumn };
}
function getNthMonday(year, month, nth) {
  let count = 0;
  for (let d = 1; d <= 31; d++) {
    const dt = new Date(year, month-1, d);
    if (dt.getMonth() !== month-1) break;
    if (dt.getDay() === 1) { count++; if (count === nth) return d; }
  }
  return null;
}
function getHolidaysForYear(year) {
  const h = {};
  const eq = getEquinox(year);
  for (const [key, name] of Object.entries(FIXED_HOLIDAYS)) {
    const [m, d] = key.split('-').map(Number);
    h[toKey(year, m, d)] = name;
  }
  h[toKey(year, 3, eq.spring)] = '春分の日';
  h[toKey(year, 9, eq.autumn)] = '秋分の日';
  for (const hm of HAPPY_MONDAY) {
    const d = getNthMonday(year, hm.month, hm.nth);
    if (d) h[toKey(year, hm.month, d)] = hm.name;
  }
  const keys = Object.keys(h);
  const substitutes = {};
  for (const k of keys) {
    const dt = new Date(k);
    if (dt.getDay() === 0) {
      let next = new Date(dt);
      next.setDate(next.getDate() + 1);
      while (h[toKey(next.getFullYear(), next.getMonth()+1, next.getDate())] ||
             substitutes[toKey(next.getFullYear(), next.getMonth()+1, next.getDate())]) {
        next.setDate(next.getDate() + 1);
      }
      substitutes[toKey(next.getFullYear(), next.getMonth()+1, next.getDate())] = '振替休日';
    }
  }
  Object.assign(h, substitutes);
  for (let m = 1; m <= 12; m++) {
    const daysInMonth = new Date(year, m, 0).getDate();
    for (let d = 2; d < daysInMonth; d++) {
      const k = toKey(year, m, d);
      if (h[k]) continue;
      const dt = new Date(year, m-1, d);
      if (dt.getDay() === 0 || dt.getDay() === 6) continue;
      const prev = toKey(year, m, d-1);
      const next = toKey(year, m, d+1);
      if (h[prev] && h[next]) h[k] = '国民の祝日';
    }
  }
  return h;
}
const holidayCache = {};
function getHoliday(year, month, day) {
  if (!holidayCache[year]) holidayCache[year] = getHolidaysForYear(year);
  return holidayCache[year][toKey(year, month, day)] || null;
}

// ===== カレンダー描画 =====
function renderCalendar() {
  document.getElementById('cal-title').textContent = `${currentYear}年 ${currentMonth+1}月`;
  const container = document.getElementById('cal-days');
  container.innerHTML = '';
  const today = new Date();
  const firstDay = new Date(currentYear, currentMonth, 1);
  const lastDay  = new Date(currentYear, currentMonth+1, 0);
  const startDow = firstDay.getDay();
  const prevLast = new Date(currentYear, currentMonth, 0);

  for(let i=startDow-1;i>=0;i--){
    const d=prevLast.getDate()-i;
    const mo=currentMonth===0?12:currentMonth;
    const yr=currentMonth===0?currentYear-1:currentYear;
    container.appendChild(makeCell(yr,mo,d,true));
  }
  for(let d=1;d<=lastDay.getDate();d++)
    container.appendChild(makeCell(currentYear,currentMonth+1,d,false));
  const endDow=lastDay.getDay();
  const total=(startDow+lastDay.getDate()+6-endDow)<=35?35:42;
  const trailing=total-startDow-lastDay.getDate();
  const nMo=currentMonth===11?1:currentMonth+2;
  const nYr=currentMonth===11?currentYear+1:currentYear;
  for(let d=1;d<=trailing;d++)
    container.appendChild(makeCell(nYr,nMo,d,true));
  container.style.gridTemplateRows=`repeat(${total/7},1fr)`;
}

function makeCell(year,month,day,other){
  const cell=document.createElement('div');
  cell.className='cal-cell'+(other?' other-month':'');
  const dow=new Date(year,month-1,day).getDay();
  if(dow===0)cell.classList.add('sunday');
  if(dow===6)cell.classList.add('saturday');
  const today=new Date();
  if(!other&&year===today.getFullYear()&&month===today.getMonth()+1&&day===today.getDate())
    cell.classList.add('today');
  const key=toKey(year,month,day);

  const holidayName = !other ? getHoliday(year,month,day) : null;
  if(holidayName) cell.classList.add('holiday');

  const num=document.createElement('div');
  num.className='day-num'; num.textContent=day;
  cell.appendChild(num);

  if(holidayName){
    const hChip=document.createElement('div');
    hChip.className='holiday-chip';
    hChip.textContent=holidayName;
    cell.appendChild(hChip);
  }

  if(events[key]?.length){
    const evDiv=document.createElement('div');
    evDiv.className='day-events';
    const mobile=isMobile();
    events[key].slice(0,2).forEach(ev=>{
      const chip=document.createElement('div');
      chip.className='event-chip';
      chip.textContent=mobile&&ev.title.length>5?ev.title.slice(0,5)+'…':ev.title;
      evDiv.appendChild(chip);
    });
    if(events[key].length>2){
      const more=document.createElement('div');
      more.className='event-chip';
      more.textContent=`+${events[key].length-2}`;
      evDiv.appendChild(more);
    }
    cell.appendChild(evDiv);
  }
  cell.addEventListener('click',()=>openPopup(key,year,month,day));
  return cell;
}

// ===== ポップアップ =====
function openPopup(key,year,month,day){
  selectedDate=key; popupDateKey=key; popupYear=year; popupMonth=month; popupDay=day;
  document.getElementById('popup-date').textContent=`${year}年${month}月${day}日`;
  renderPopupEvents();
  document.getElementById('popup-input').value='';
  document.getElementById('popup').classList.remove('hidden');
  renderCalendar();
}
function renderPopupEvents(){
  const list=document.getElementById('popup-events');
  list.innerHTML='';
  (events[popupDateKey]||[]).forEach(ev=>{
    const li=document.createElement('li');
    li.textContent=ev.title;
    li.addEventListener('click',()=>{closePopup();highlightLine(ev.lineIndex);});
    list.appendChild(li);
  });
}
function closePopup(){
  document.getElementById('popup').classList.add('hidden');
  popupDateKey=null;
}

function addEventFromPopup(){
  const input=document.getElementById('popup-input');
  const title=input.value.trim();
  if(!title||!popupDateKey)return;
  const ta=document.getElementById('schedule-text');
  const newLine=`${popupMonth}/${popupDay} ${title}`;
  ta.value = ta.value ? newLine+'\n'+ta.value : newLine;
  events=parseSchedule(ta.value);
  renderCalendar();
  input.value='';
  scheduleAutoSave();
  closePopup();
}

function highlightLine(idx){
  const ta=document.getElementById('schedule-text');
  const lines=ta.value.split('\n');
  let pos=0; for(let i=0;i<idx;i++)pos+=lines[i].length+1;
  const end=pos+(lines[idx]||'').length;
  ta.focus(); ta.setSelectionRange(pos,end);
  ta.scrollTop=idx*(0.95*16*2.1)-40;
}

// ===== 自動保存 =====
function scheduleAutoSave(){
  clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(syncSave,2000);
}
function onTextChange(){
  events=parseSchedule(document.getElementById('schedule-text').value);
  renderCalendar(); scheduleAutoSave();
}

// ===== スワイプ =====
let tx=0,ty=0;
document.addEventListener('DOMContentLoaded',()=>{
  const sw=document.getElementById('cal-swipe-wrapper');
  sw.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
  sw.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>80){ dx<0?goNext():goPrev(); }
  },{passive:true});
});
function goPrev(){ if(--currentMonth<0){currentMonth=11;currentYear--;} renderCalendar(); }
function goNext(){ if(++currentMonth>11){currentMonth=0;currentYear++;} renderCalendar(); }

// ===== GitHub =====
// ★ キー名に calendar- プレフィックスを付けて他アプリ（SyncNote等）と競合しないようにする
const GH_KEYS=['calendar-gh-user','calendar-gh-repo','calendar-gh-path','calendar-gh-token'];
function loadGhSettings(){
  GH_KEYS.forEach(k=>{
    const v=localStorage.getItem(k);
    if(v) document.getElementById(k).value=v;
  });
}
function saveGhSettings(){
  GH_KEYS.forEach(k=>localStorage.setItem(k, document.getElementById(k).value));
  document.getElementById('modal-github').classList.add('hidden');
  syncLoad();
}
function getGhConfig(){
  return {
    user:  localStorage.getItem('calendar-gh-user')  || '',
    repo:  localStorage.getItem('calendar-gh-repo')  || '',
    path:  localStorage.getItem('calendar-gh-path')  || 'schedule.txt',
    token: localStorage.getItem('calendar-gh-token') || ''
  };
}
function isGhConfigured(){ const c=getGhConfig(); return c.user&&c.repo&&c.token; }

async function ghFetch(text){
  const c=getGhConfig();
  const url=`https://api.github.com/repos/${c.user}/${c.repo}/contents/${c.path}`;
  const headers={'Authorization':`token ${c.token}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};

  // まず現在のファイル情報を取得（sha と内容）
  let sha = null;
  let existingContent = null;
  try{
    const r=await fetch(url,{headers});
    if(r.ok){
      const d=await r.json();
      sha=d.sha;
      existingContent=decodeURIComponent(escape(atob(d.content.replace(/\n/g,''))));
    }
  }catch(e){}

  // 読み込みモード
  if(text===null) return existingContent;

  // 書き込みモード: sha が取れていれば必ず付ける（既存ファイルの上書きに必須）
  const body={
    message:'Update schedule',
    content:btoa(unescape(encodeURIComponent(text)))
  };
  if(sha) body.sha=sha;
  const r=await fetch(url,{method:'PUT',headers,body:JSON.stringify(body)});
  return r.ok;
}

function setStatus(msg,ok=true){
  const el=document.getElementById('sync-status');
  el.textContent=msg; el.style.color=ok?'#27ae60':'#e74c3c';
  if(msg)setTimeout(()=>{el.textContent='';},3000);
}
async function syncLoad(){
  if(!isGhConfigured())return; setStatus('読込中…');
  try{
    const text=await ghFetch(null);
    if(text!==null){document.getElementById('schedule-text').value=text;events=parseSchedule(text);renderCalendar();setStatus('読込完了');}
    else setStatus('');
  }catch(e){setStatus('読込失敗',false);}
}
async function syncSave(){
  if(!isGhConfigured())return; setStatus('保存中…');
  try{
    const ok=await ghFetch(document.getElementById('schedule-text').value);
    setStatus(ok?'保存完了':'保存失敗',!!ok);
  }catch(e){setStatus('保存失敗',false);}
}

// ===== 初期化 =====
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('schedule-text').value=SAMPLE;
  events=parseSchedule(SAMPLE);
  renderCalendar();

  document.getElementById('schedule-text').addEventListener('input',onTextChange);
  document.getElementById('btn-prev').addEventListener('click',goPrev);
  document.getElementById('btn-next').addEventListener('click',goNext);
  document.getElementById('btn-settings').addEventListener('click',()=>{loadGhSettings();document.getElementById('modal-github').classList.remove('hidden');});
  document.getElementById('modal-cancel').addEventListener('click',()=>document.getElementById('modal-github').classList.add('hidden'));
  document.getElementById('modal-save').addEventListener('click',saveGhSettings);
  document.getElementById('popup-close').addEventListener('click',closePopup);
  document.getElementById('popup').addEventListener('click',e=>{if(e.target===document.getElementById('popup'))closePopup();});
  document.getElementById('popup-add-btn').addEventListener('click',addEventFromPopup);
  document.getElementById('popup-input').addEventListener('keydown',e=>{if(e.key==='Enter')addEventFromPopup();});
  document.getElementById('btn-reload').addEventListener('click',syncLoad);

  syncLoad();

  if('serviceWorker' in navigator){
    const sw=`
self.addEventListener('install',e=>e.waitUntil(
  caches.open('cal-v1').then(c=>c.addAll([location.href]))
));
self.addEventListener('fetch',e=>e.respondWith(
  caches.match(e.request).then(r=>r||fetch(e.request))
));`;
    const blob=new Blob([sw],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:'./'}).catch(()=>{});
  }
});
</script>
